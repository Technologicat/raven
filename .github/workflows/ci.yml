name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check . --ignore SIM103

      - name: Lint advisories (non-blocking)
        run: ruff check . --select SIM103 || true

  test:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install CI test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy "bibtexparser>=2.0.0b8" unpythonic Pillow tqdm requests feedparser
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -e . --no-deps

      - name: Run tests
        run: pytest raven/ -v --tb=short
