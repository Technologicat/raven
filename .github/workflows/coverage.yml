name: Coverage

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install CI test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov numpy "bibtexparser>=2.0.0b8" unpythonic sseclient-py Pillow tqdm requests feedparser
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -e . --no-deps

      - name: Run tests with coverage
        run: pytest raven/ -v --tb=short --cov=raven --cov-branch --cov-report=xml:coverage.xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
