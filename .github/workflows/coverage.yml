name: Coverage

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install CI test dependencies
        # Why hand-pick deps instead of `pdm install`? raven's full dep tree
        # pulls in torch+torchvision (multi-GB) and the Python-version-pinned
        # kokoro/misaki TTS stack — none of which the test suite needs.
        # We install pytest, pytest-cov, a minimal subset of runtime deps,
        # the CPU-only PyTorch wheels, and finally the package itself with
        # `--no-deps` so pip doesn't re-resolve the full tree.
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov numpy "bibtexparser>=2.0.0b8" unpythonic Pillow tqdm requests feedparser wosfile
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -e . --no-deps

      - name: Run tests with coverage
        run: pytest raven/ -v --tb=short -m "not ml" --cov=raven --cov-branch --cov-report=xml:coverage.xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
